<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  html, body { margin: 0; background: transparent; overflow: hidden;
    font: 13px system-ui, sans-serif; color: #dbe4ee; user-select: none; }
  .card { margin: 6px; padding: 10px 12px; border-radius: 10px;
    background: rgba(16, 20, 28, .92); border: 1px solid rgba(94,234,212,.3); }
  .name { font-weight: 600; margin-bottom: 2px; }
  .Normal { color: #c8c8c8; } .Magic { color: #8888ff; } .Rare { color: #ffff77; }
  .Unique { color: #af6025; } .Currency { color: #aa9e82; }
  .base { color: #8b98a9; font-size: 11px; }
  .price { font-size: 16px; color: #5eead4; margin: 6px 0 2px; }
  .div { color: #c9b37e; font-size: 12px; }
  .none { color: #8b98a9; font-style: italic; margin: 6px 0 2px; }
  .src { color: #5b6676; font-size: 10px; margin-top: 4px; }
  #advice { margin-top: 6px; border-top: 1px solid rgba(94,234,212,.15); padding-top: 6px; }
  .verdict { font-weight: 700; font-size: 13px; }
  .GOOD { color: #5eead4; } .CAUTION { color: #f5d90a; }
  .RISKY { color: #fb923c; } .SKIP { color: #f87171; }
  .find { font-size: 11px; margin: 2px 0; }
  .brick { color: #f87171; } .danger { color: #fb923c; } .note { color: #8b98a9; }
  .rewards { font-size: 11px; color: #c9b37e; margin-top: 4px; }
</style>
</head>
<body>
<div class="card" id="pricecard">
  <div class="name" id="name"></div>
  <div class="base" id="base"></div>
  <div id="priceline"></div>
  <div id="advice" style="display:none"></div>
  <div class="src" id="src"></div>
</div>
<div class="card" id="noticecard" style="display:none">
  <div class="name" style="color:#f5d90a" id="noticetitle"></div>
  <div id="noticelines"></div>
</div>
<div class="card" id="recscard" style="display:none">
  <div class="name" style="color:#5eead4">Upgrade shopping list</div>
  <div id="recrows"></div>
  <div class="src" id="recsrc"></div>
</div>
<script>
  const $ = id => document.getElementById(id);
  const esc = s => String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  const fmtEx = v => v >= 100 ? Math.round(v) : v >= 10 ? v.toFixed(1) : v.toFixed(2);

  window.overlay.onNotice(d => {
    $('pricecard').style.display = 'none';
    $('recscard').style.display = 'none';
    $('noticecard').style.display = 'block';
    $('noticetitle').textContent = d.title;
    $('noticelines').innerHTML = d.lines.map(l => `<div class="find note">• ${esc(l)}</div>`).join('');
  });

  window.overlay.onPin(p => {
    document.querySelectorAll('.card').forEach(c =>
      c.style.borderColor = p ? '#f5d90a' : 'rgba(94,234,212,.3)');
  });

  window.overlay.onRecs(d => {
    $('pricecard').style.display = 'none';
    $('noticecard').style.display = 'none';
    $('recscard').style.display = 'block';
    if (!d.items || !d.items.length) {
      $('recrows').innerHTML = `<div class="none">${esc(d.note || (d.computing ? 'computing prices…' : 'nothing to show'))}</div>`;
      $('recsrc').textContent = '';
      return;
    }
    let html = '';
    for (const it of d.items.slice(0, 10)) {
      const price = it.ex != null
        ? `<span style="color:#5eead4">${fmtEx(it.ex)} ex</span>${it.divine >= 0.05 ? ` <span class="div">(${it.divine.toFixed(1)}d)</span>` : ''}`
        : `<span class="none" style="font-size:10px">${esc(it.note || 'unpriced')}</span>`;
      html += `<div class="find" style="${it.owned ? 'opacity:.45' : ''}">`
        + `${it.owned ? '✓ ' : ''}<span class="base">${esc(it.slot)}</span> ${esc(it.name)} — ${price}</div>`;
    }
    $('recrows').innerHTML = html;
    const age = d.computedAt ? Math.round((Date.now() - d.computedAt) / 60000) : null;
    $('recsrc').textContent = `unowned first, cheapest first · ${d.league || ''}${age != null ? ` · priced ${age}m ago` : ''}${d.computing ? ' · refreshing…' : ''}`;
  });

  window.overlay.onPrice(d => {
    $('recscard').style.display = 'none';
    $('noticecard').style.display = 'none';
    $('pricecard').style.display = 'block';
    $('name').textContent = d.item.name || d.item.baseType || '?';
    $('name').className = 'name ' + (d.item.rarity || '');
    $('base').textContent = d.item.baseType && d.item.name !== d.item.baseType ? d.item.baseType : '';
    if (d.price.found) {
      const fmt = v => v >= 100 ? Math.round(v) : v >= 10 ? v.toFixed(1) : v.toFixed(2);
      let line = `<div class="price">${d.price.median ? 'from ' : ''}${fmt(d.price.price)} ex`;
      if (d.price.divine >= 0.05) line += ` <span class="div">≈ ${d.price.divine.toFixed(2)} div</span>`;
      if (d.price.median) line += ` <span class="div">· median ${fmt(d.price.median)} ex · ${d.price.total} online</span>`;
      line += (d.item.stackSize && d.item.stackSize.cur > 1)
        ? ` <span class="div">× ${d.item.stackSize.cur} = ${(d.price.price * d.item.stackSize.cur).toFixed(0)} ex</span>` : '';
      $('priceline').innerHTML = line + '</div>';
      const un = (d.price.unmatched || []).length;
      $('src').textContent = `${d.price.source} · ${d.price.league}`
        + (un ? ` · ${un} mod(s) not in search` : '')
        + (d.price.tradeUrl ? ' · Ctrl+Alt+T: open trade · Ctrl+Alt+P: pin' : ' · Ctrl+Alt+P: pin');
    } else {
      $('priceline').innerHTML = `<div class="none">${d.price.note || 'no listed price'}</div>`;
      $('src').textContent = d.price.league || '';
    }
    const a = d.price.advice;
    if (a) {
      const esc = s => s.replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
      let html = `<div class="verdict ${a.verdict}">${a.verdict}</div>`;
      for (const f of a.findings.filter(x => x.sev !== 'note').concat(a.findings.filter(x => x.sev === 'note')).slice(0, 5)) {
        html += `<div class="find ${f.sev}">• ${esc(f.why)}</div>`;
      }
      if (a.rewards.length) html += `<div class="rewards">${esc(a.rewards.join(' · '))}</div>`;
      $('advice').innerHTML = html;
      $('advice').style.display = 'block';
      $('src').textContent += ` · build: ${a.tags.join('/')}`;
    } else {
      $('advice').style.display = 'none';
    }
  });
</script>
</body>
</html>
